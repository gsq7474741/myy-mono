# 此工作流将安装 node 依赖，缓存/恢复它们，并构建源代码
# 更多信息请参考：https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: 构建 myy-app h5 版本

on:
  workflow_dispatch:
  

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 安装 pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest
        run_install: false

    - name: 使用 Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    # 缓存 pnpm 依赖
    - name: 缓存 pnpm 依赖
      uses: actions/cache@v3
      id: pnpm-cache
      with:
        path: |
          ~/.pnpm-store
          node_modules
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    # 只有在缓存未命中时才安装依赖
    - name: 安装依赖
      if: steps.pnpm-cache.outputs.cache-hit != 'true'
      run: pnpm install --frozen-lockfile

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 安装 pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest
        run_install: false

    - name: 使用 Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    # 恢复缓存的依赖
    - name: 恢复 pnpm 依赖
      uses: actions/cache@v3
      id: pnpm-cache
      with:
        path: |
          ~/.pnpm-store
          node_modules
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: 如需安装依赖
      if: steps.pnpm-cache.outputs.cache-hit != 'true'
      run: pnpm install --frozen-lockfile

    # 构建项目
    - name: 构建项目
      env:
        NODE_ENV: production
      run: pnpm --filter myy-app run build:h5
